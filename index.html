<html>
	<head>
          <style>

	 body {
		background-color: #f5f5f5;
		text-align: center;
		font-family: Arial;
	      }
	h1 {
		color : #e91e63;
	   }
	img {
		.profile-pic {
    max-width: 250px;    /* Isse bada nahi hoga */
    width: 100%;         /* Screen choti hogi toh photo bhi choti */
    height: auto;        /* Height apne aap adjust ho jayegi */
    border-radius: 20px;
    object-fit: cover;
}
	    }
	p {
		color : #333;
		font-size : 18px;
	    }
	h2 {
		color : #2196F3;
		margin-top : 30px;
	   } 
	button {
		background-color : #e91e63;
		color : White;
		padding : 12px 30px;
		border: none;
		border-radius : 25px;
		font-size : 16px;
		margin-top : 20px;
		cursor : pointer;
	       }
		 button : hover {
		    background-color : #c2185b;
		}

		
	.card {
		background-color : white;
		max-width : 600px;
		margin : 40px auto;
		padding : 40px;
		border-radius : 15px;
		box-shadow : 0 8px 16px rgba(0,0,0,0.1);
		}

		#message {
   		 color: #e63946;
    		font-weight: bold;
   		 margin-top: 20px;
    		font-size: 18px;
		}
	</style> 
		  


		
	</head>
	<body>	  
		<div class="card">

	   <h1> Sayyed Kashaf Anisoddin </h1>
	
	   <img src="photo.jpg"  alt="kashaf" width="200" height="200" style="border-radius: 15px;">

	   <p> "I am sayyed kashaf, BCS 2nd year student.Learning Web Development to get my first tech job." 
	   </p>

		<h2> About Me </h2>
		 <p>
		    I am learning HTML, CSS and Javascript.
		    My hobbies are coding, reading, and watching tech videos.
		    My goal is to become a Frontend developer.
		</p>


		<p id="message"></p>



		<div style="margin-top: 30px;">

		<h3>My To-Do List</h3>
<input type="text" id="taskInput" placeholder="Enter a task...">
<button id="addBtn">Add</button>
<ul id="taskList" style="list-style: none; padding: 0; margin-top: 20px;"></ul>

<button id="contactBtn">Contact Me</button>
<p id="message"></p>

<script>
// Page load pe saved tasks dikhao
window.onload = function() {
    let savedTasks = localStorage.getItem('myTasks');
    if(savedTasks) {
        document.getElementById('taskList').innerHTML = savedTasks;
    }
}

// Contact button
document.getElementById('contactBtn').onclick = function() {
    let name = prompt('What is your name?');
    if(name) {
        document.getElementById('message').innerHTML = 'Hello ' + name + '! Kashaf will reply soon!';
    }
}

// Add button
document.getElementById('addBtn').onclick = function() {
    let task = document.getElementById('taskInput').value;
    if(task !== '') {
        document.getElementById('taskList').innerHTML += '<li><input type="checkbox" onchange="this.nextElementSibling.style.textDecoration=this.checked?\'line-through\':\'none\'; saveTasks()"> <span>' + task + '</span> <button onclick="this.parentElement.remove(); saveTasks()" style="margin-left:10px;">X</button></li>';
        document.getElementById('taskInput').value = '';
        saveTasks();
    }
}

// Save function
function saveTasks() {
    localStorage.setItem('myTasks', document.getElementById('taskList').innerHTML);
}
</script>


        </body>
   </html>
